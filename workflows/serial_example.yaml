# 串行工作流示例
# 任务按顺序逐个执行，适用于有依赖关系的场景

workflow:
  id: serial_example_001
  name: 串行测试工作流
  description: 按顺序执行多个 Case，演示串行执行模式
  execution_mode: serial
  auto_clear: true
  
  timing:
    start_delay: 5              # 整体启动延迟 5 秒
    node_interval: 10           # 节点间延迟 10 秒
    task_timeout: 600           # 单任务超时 600 秒
    global_timeout: 1800        # 全局超时 30 分钟

  tasks:
    - id: task_sw_command
      name: 交换机命令执行
      timing:
        task_timeout: 300       # 任务级超时覆盖
      case:
        name: sw_command_execution
        type: sw
        environment: sw_ssh_remote1
        fault_type: command
        sw_match:
          commands:
            - cmd: screen-length disable
              wait: 2
            - cmd: display interface brief
              wait: 5
          loop_count: 1

    - id: task_pod_failure
      name: UPC Pod 故障测试
      case:
        name: upc_pod_failure
        type: pod
        environment: 1_ssh_remote
        fault_type: delete
        pod_match:
          name:
            - upc-talker
          namespace: ns-dupf
          interval: 5
        duration: 30s
        loop_count: 0
        parameters:
          action: kill
          grace_period: 30
        namespace: ns-dupf

    - id: task_network_delay
      name: 网络延迟测试
      case:
        name: network_delay
        type: network
        environment: 1_ssh_remote
        fault_type: delay
        pod_match:
          name: dupf-upu-dupf01-1
          namespace: ns-dupf
          labels:
            app: dupf
            component: upu
        duration: 60s
        loop_count: 3
        parameters:
          delay: 1000ms
          device: eth0
          direction: both
          jitter: 100ms
          loss: 0%
        namespace: ns-dupf
