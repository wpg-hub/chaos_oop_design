# 并行工作流示例
# 多个任务同时执行，适用于独立无依赖的场景

workflow:
  id: parallel_example_001
  name: 并行测试工作流
  description: 多个 Case 同时执行，演示并行执行模式
  execution_mode: parallel
  auto_clear: false
  
  timing:
    start_delay: 0              # 整体启动延迟
    task_timeout: 600           # 单任务超时
    global_timeout: 900         # 全局超时 15 分钟
    branch_start_delay: 5       # 分支启动延迟 5 秒（错开启动）

  tasks:
    - id: task_sw_1
      name: 交换机命令执行 1
      case:
        name: sw_command_1
        type: sw
        environment: sw_ssh_remote1
        fault_type: command
        sw_match:
          commands:
            - cmd: screen-length disable
              wait: 2
            - cmd: display interface brief
              wait: 5
          loop_count: 1

    - id: task_sw_2
      name: 交换机命令执行 2
      case:
        name: sw_command_2
        type: sw
        environment: sw_ssh_remote2
        fault_type: command
        sw_match:
          commands:
            - cmd: screen-length disable
              wait: 2
            - cmd: display bgp peer
              wait: 5
          loop_count: 1

    - id: task_pod_upc
      name: UPC Pod 故障测试
      case:
        name: upc_pod_failure
        type: pod
        environment: 1_ssh_remote
        fault_type: delete
        pod_match:
          name:
            - upc-talker
          namespace: ns-dupf
          interval: 5
        duration: 30s
        loop_count: 0
        parameters:
          action: kill
          grace_period: 30
        namespace: ns-dupf

    - id: task_network_delay
      name: 网络延迟测试
      case:
        name: network_delay
        type: network
        environment: 1_ssh_remote
        fault_type: delay
        pod_match:
          name: dupf-upu-dupf01-1
          namespace: ns-dupf
        duration: 60s
        loop_count: 1
        parameters:
          delay: 500ms
          device: eth0
          direction: both
        namespace: ns-dupf
