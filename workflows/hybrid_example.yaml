# 混合工作流示例
# 分组并行 + 组内串行，适用于复杂场景

workflow:
  id: hybrid_example_001
  name: 混合测试工作流
  description: 分组并行 + 组内串行示例，演示混合执行模式
  execution_mode: hybrid
  auto_clear: true
  
  timing:
    global_timeout: 3600
    branch_start_delay: 10      # 分支间启动延迟 10 秒

  groups:
    # ---------- 分支1：交换机测试 ----------
    - id: branch_sw
      name: 交换机测试分支
      execution_mode: serial    # 组内串行执行
      start_delay: 0            # 分组启动延迟
      timing:
        node_interval: 5        # 组内节点间隔 5 秒
      
      tasks:
        - id: sw_1
          name: SW1 命令测试
          case:
            name: sw1_command
            type: sw
            environment: sw_ssh_remote1
            fault_type: command
            sw_match:
              commands:
                - cmd: screen-length disable
                  wait: 2
                - cmd: display interface brief
                  wait: 5
              loop_count: 1

        - id: sw_2
          name: SW2 命令测试
          case:
            name: sw2_command
            type: sw
            environment: sw_ssh_remote2
            fault_type: command
            sw_match:
              commands:
                - cmd: display bgp peer
                  wait: 5
              loop_count: 1

    # ---------- 分支2：Pod 故障测试 ----------
    - id: branch_pod
      name: Pod 故障测试分支
      execution_mode: serial
      start_delay: 10           # 延迟 10 秒启动
      timing:
        node_interval: 3
      
      tasks:
        - id: pod_upc
          name: UPC Pod 故障
          case:
            name: upc_pod_failure
            type: pod
            environment: 1_ssh_remote
            fault_type: delete
            pod_match:
              name:
                - upc-talker
              namespace: ns-dupf
              interval: 5
            duration: 30s
            loop_count: 0
            parameters:
              action: kill
              grace_period: 30
            namespace: ns-dupf

        - id: pod_network
          name: 网络延迟测试
          case:
            name: network_delay
            type: network
            environment: 1_ssh_remote
            fault_type: delay
            pod_match:
              name: dupf-upu-dupf01-1
              namespace: ns-dupf
              labels:
                app: dupf
                component: upu
            duration: 60s
            loop_count: 3
            parameters:
              delay: 1000ms
              device: eth0
              direction: both
              jitter: 100ms
              loss: 0%
            namespace: ns-dupf

    # ---------- 分支3：物理机测试 ----------
    - id: branch_computer
      name: 物理机测试分支
      execution_mode: serial
      start_delay: 20           # 延迟 20 秒启动
      
      tasks:
        - id: computer_reboot
          name: 物理机重启测试
          case:
            name: computer_reboot
            type: computer
            fault_type: reboot
            computer_match:
              name:
                - 1_ssh_remote
                - 2_ssh_remote
            duration: 0
            loop_count: 1

  # ---------- 收尾任务（可选） ----------
  final_tasks:
    - id: cleanup
      name: 清理环境
      case:
        name: cleanup_all
        type: sw
        environment: sw_ssh_remote1
        fault_type: command
        sw_match:
          commands:
            - cmd: display current-configuration
              wait: 2
          loop_count: 1
