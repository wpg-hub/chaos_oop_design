# BMC 串行电源循环工作流
# 依次对 bmc_remote1, bmc_remote2, bmc_remote3, bmc_remote4 执行 cycle 操作

workflow:
  id: ipmitool_cycle_serial_001
  name: BMC串行电源循环工作流
  description: 按顺序依次对 BMC 执行电源循环(cycle)操作
  execution_mode: serial
  auto_clear: false
  
  timing:
    start_delay: 120              # 整体启动延迟 120 秒
    node_interval: 60             # 节点间延迟 60 秒
    task_timeout: 300             # 单任务超时 5 分钟
    global_timeout: 3600          # 全局超时 1 小时

  tasks:
    - id: bmc_remote1_cycle
      name: bmc_remote1 电源循环
      case:
        name: bmc_remote1_cycle
        type: ipmitool
        fault_type: cycle
        ipmitool_match:
          name:
            - bmc_remote1
        duration: 1200s
        loop_count: 1

    - id: bmc_remote2_cycle
      name: bmc_remote2 电源循环
      case:
        name: bmc_remote2_cycle
        type: ipmitool
        fault_type: cycle
        ipmitool_match:
          name:
            - bmc_remote2
        duration: 1200s
        loop_count: 1

    - id: bmc_remote3_cycle
      name: bmc_remote3 电源循环
      case:
        name: bmc_remote3_cycle
        type: ipmitool
        fault_type: cycle
        ipmitool_match:
          name:
            - bmc_remote3
        duration: 1200s
        loop_count: 1

    - id: bmc_remote4_cycle
      name: bmc_remote4 电源循环
      case:
        name: bmc_remote4_cycle
        type: ipmitool
        fault_type: cycle
        ipmitool_match:
          name:
            - bmc_remote4
        duration: 1200s
        loop_count: 1
