name: tor_one_peerlink_down.yaml
description: tor_one_peerlink_down
type: sw
environment: sw_ssh_remote1
fault_type: command
sw_match:
  commands:
    - cmd: screen-length disable
    - cmd: sys
    - cmd: interface WGE1/0/31
    - cmd: shutdown
    - cmd: display this
      wait: 60
    - cmd: undo shutdown
    - cmd: display this
      wait: 10
    - cmd: interface WGE1/0/32
    - cmd: shutdown
    - cmd: display this
      wait: 60
    - cmd: undo shutdown
    - cmd: display this
      wait: 60
  loop_count: 1
