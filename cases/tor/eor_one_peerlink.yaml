name: eor_one_peerlink.yaml
description: eor_one_peerlinkeor_one_peerlink.yaml
type: sw
environment: sw_ssh_remote3
fault_type: command
sw_match:
  commands:
    - cmd: screen-length disable
    - cmd: sys
    - cmd: interface range WGE1/0/41 to WGE1/0/44
    - cmd: shutdown
      wait: 5
    - cmd: interface WGE1/0/41
    - cmd: display this
      wait: 60
    - cmd: interface range WGE1/0/41 to WGE1/0/44
    - cmd: undo shutdown
      wait: 60
    - cmd: interface WGE1/0/41
    - cmd: display this
  loop_count: 1
