name: eor_double_horizontal_updown.yaml
description: eor_double_horizontal_updown
type: sw
environment: sw_ssh_remote3
fault_type: command
sw_match:
  commands:
    - cmd: screen-length disable
    - cmd: sys
    - cmd: interface HGE1/0/27
    - cmd: shutdown
    - cmd: display this
    - cmd: interface HGE1/0/28
    - cmd: shutdown
    - cmd: display this
      wait: 60
    - cmd: interface HGE1/0/27
    - cmd: undo shutdown
    - cmd: display this
      wait: 10
    - cmd: interface HGE1/0/28
    - cmd: undo shutdown
    - cmd: display this
      wait: 60
  loop_count: 1
