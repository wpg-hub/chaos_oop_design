# 网络数据包破坏故障注入 Case 模板
# 本模板展示网络数据包破坏故障注入的完整参数配置

name: network_corrupt
description: Network corrupt fault test
type: network
environment: 1_ssh_remote
fault_type: corrupt
pod_match:
  name: ddb-master

# 网络数据包破坏参数配置
# 所有参数均为可选，不指定时使用默认值或随机生成
parameters:
  # device: 网卡设备名
  # - 可选参数
  # - 优先级: 参数 > config.yaml > 默认值 eth0
  # - 不指定时从 config.yaml 的 device 字段获取
  # - 示例: eth0, eth1, ens33
  
  # percent: 被损坏的数据包所占比例
  # - 可选参数，默认值: 随机 1%~90%
  # - 支持格式:
  #   1. 固定值: "1%"
  #   2. 范围值: ["10%", "90%"] - 在范围内随机选择
  #   3. 不指定: 自动随机生成 1%~90%
  percent: ["10%", "90%"]
  
  # correlation: 损坏事件之间的相关性
  # - 可选参数，默认值: 随机 1%~90%
  # - 支持格式:
  #   1. 固定值: "25%"
  #   2. 范围值: ["10%", "90%"] - 在范围内随机选择
  #   3. 不指定: 自动随机生成 1%~90%
  # - 说明: 相关性越高，损坏事件越容易连续发生
  correlation: ["30%", "90%"]

# 故障持续时间
duration: 60s

# 循环执行次数
loop_count: 1

# 是否自动清除故障
auto_clear: true

# ============ 参数组合示例 ============
#
# 示例 1: 最简配置（所有参数随机生成）
# parameters: {}
#
# 示例 2: 指定损坏比例
# parameters:
#   percent: 0.5%
#
# 示例 3: 指定损坏比例和相关性
# parameters:
#   percent: 0.5%
#   correlation: 25%
#
# 示例 4: 使用范围值
# parameters:
#   percent: ["1%", "10%"]
#   correlation: ["20%", "50%"]
#
# 示例 5: 指定网卡设备
# parameters:
#   device: eth1
#   percent: 2%
#   correlation: 30%
#
# ============ tc 命令示例 ============
#
# 基本命令:
# tc qdisc add dev eth0 root netem corrupt 0.5% 25%
#
# 说明:
# - corrupt 0.5%: 0.5% 的数据包会被损坏
# - 25%: 损坏事件之间的相关性为 25%
#
# 效果:
# - 数据包会被随机修改字节内容，导致接收方收到错误的数据
# - 适用于测试应用层对数据完整性校验的能力
# - 相关性越高，损坏事件越容易连续发生（模拟突发性错误）
