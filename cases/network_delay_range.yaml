name: network_delay_range
description: Network delay with custom range parameters
type: network
environment: 1_ssh_remote
fault_type: delay
pod_match:
  name: dupf-upu-dupf01-1
parameters:
  device: eth0
  time:
    - 200ms
    - 800ms
  jitter:
    - 20ms
    - 100ms
  correlation:
    - 10%
    - 90%
  distribution: normal
duration: 60s
loop_count: 1
auto_clear: true
