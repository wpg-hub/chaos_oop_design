# 网络数据包重复故障注入 Case 模板
# 本模板展示网络数据包重复故障注入的完整参数配置

name: network_duplicate
description: Network duplicate fault test
type: network
environment: 1_ssh_remote
fault_type: duplicate
pod_match:
  name: dupf-upu-dupf01-1

# 网络数据包重复参数配置
# 所有参数均为可选，不指定时使用默认值或随机生成
parameters:
  # device: 网卡设备名
  # - 可选参数
  # - 优先级: 参数 > config.yaml > 默认值 eth0
  # - 不指定时从 config.yaml 的 device 字段获取
  # - 示例: eth0, eth1, ens33
  
  # percent: 被复制的数据包所占比例
  # - 可选参数，默认值: 随机 0.5%~10%
  # - 支持格式:
  #   1. 固定值: "0.5%"
  #   2. 范围值: ["0.5%", "10%"] - 在范围内随机选择
  #   3. 不指定: 自动随机生成 0.5%~10%
  percent: ["0.5%", "10%"]
  
  # correlation: 重复事件之间的相关性
  # - 可选参数，默认值: 随机 1%~90%
  # - 支持格式:
  #   1. 固定值: "25%"
  #   2. 范围值: ["10%", "90%"] - 在范围内随机选择
  #   3. 不指定: 自动随机生成 1%~90%
  # - 说明: 相关性越高，重复事件越容易连续发生
  correlation: ["10%", "90%"]

# 故障持续时间
duration: 300s

# 循环执行次数
loop_count: 1

# 是否自动清除故障
auto_clear: true

# ============ 参数组合示例 ============
#
# 示例 1: 最简配置（所有参数随机生成）
# parameters: {}
#
# 示例 2: 指定重复比例
# parameters:
#   percent: 0.3%
#
# 示例 3: 指定重复比例和相关性
# parameters:
#   percent: 0.3%
#   correlation: 50%
#
# 示例 4: 使用范围值
# parameters:
#   percent: ["0.5%", "5%"]
#   correlation: ["20%", "50%"]
#
# 示例 5: 指定网卡设备
# parameters:
#   device: eth1
#   percent: 1%
#   correlation: 30%
#
# ============ tc 命令示例 ============
#
# 基本命令:
# tc qdisc add dev eth0 root netem duplicate 0.3% 50%
#
# 说明:
# - duplicate 0.3%: 0.3% 的数据包会被复制（重复发送）
# - 50%: 重复事件之间的相关性为 50%
#
# 效果:
# - 数据包会被复制并重复发送，导致接收方收到重复的数据包
# - 适用于测试应用层对重复数据包的处理能力
# - 相关性越高，重复事件越容易连续发生（模拟突发性重复）
# - 注意: 重复的数据包可能会导致应用层逻辑错误，需要应用层进行去重处理
