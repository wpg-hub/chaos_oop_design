# 多 Pod 随机选择示例
name: multi_pod_random_select
description: Multiple pod random selection test
type: pod
environment: 1_ssh_remote
fault_type: delete
pod_match:
  name: dupf-upu-dupf01-*
  labels:
    app: dupf
    component: upu
  random: true
  count: 2
duration: 30s
loop_count: 1
namespace: ns-dupf
auto_clear: false
