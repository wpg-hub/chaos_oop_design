# UPU 并行网络数据包破坏工作流
# 同时对 upu-master, upu-slave Pod 注入数据包破坏故障

workflow:
  id: upu_parallel_network_corrupt_001
  name: UPU 并行网络数据包破坏工作流
  description: 并行对 upu-master, upu-slave Pod 注入数据包破坏故障，测试系统容错能力
  execution_mode: parallel
  auto_clear: true
  
  timing:
    start_delay: 10
    task_timeout: 300
    global_timeout: 600
    branch_start_delay: 2

  tasks:
    - id: corrupt_upu_master
      name: UPU Master 数据包破坏
      case:
        name: upu_master_corrupt
        type: network
        environment: 1_ssh_remote
        fault_type: corrupt
        pod_match:
          name:
            - upu-master
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
        parameters:
          percent: ["10%", "90%"]
          correlation: ["30%", "90%"]

    - id: corrupt_upu_slave
      name: UPU Slave 数据包破坏
      case:
        name: upu_slave_corrupt
        type: network
        environment: 1_ssh_remote
        fault_type: corrupt
        pod_match:
          name:
            - upu-slave
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
        parameters:
          percent: ["10%", "90%"]
          correlation: ["30%", "90%"]
