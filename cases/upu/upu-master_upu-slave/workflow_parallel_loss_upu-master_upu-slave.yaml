# UPU 并行网络丢包工作流
# 同时对 upu-master, upu-slave Pod 注入网络丢包故障

workflow:
  id: upu_parallel_network_loss_001
  name: UPU 并行网络丢包工作流
  description: 并行对 upu-master, upu-slave Pod 注入网络丢包故障，测试系统容错能力
  execution_mode: parallel
  auto_clear: true
  
  timing:
    start_delay: 10
    task_timeout: 300
    global_timeout: 600
    branch_start_delay: 2

  tasks:
    - id: loss_upu_master
      name: UPU Master 网络丢包
      case:
        name: upu_master_loss
        type: network
        environment: 1_ssh_remote
        fault_type: loss
        pod_match:
          name:
            - upu-master
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
        parameters:
          percent: ["10%", "90%"]
          correlation: ["30%", "90%"]

    - id: loss_upu_slave
      name: UPU Slave 网络丢包
      case:
        name: upu_slave_loss
        type: network
        environment: 1_ssh_remote
        fault_type: loss
        pod_match:
          name:
            - upu-slave
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
        parameters:
          percent: ["10%", "90%"]
          correlation: ["30%", "90%"]
