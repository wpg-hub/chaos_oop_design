# UPU 并行 Pod 删除工作流
# 同时对 upu-master, upu-slave Pod 注入删除故障

workflow:
  id: upu_parallel_pod_delete_001
  name: UPU 并行 Pod 删除工作流
  description: 并行对 upu-master, upu-slave Pod 注入删除故障，测试系统容错能力
  execution_mode: parallel
  auto_clear: false
  
  timing:
    start_delay: 10
    task_timeout: 300
    global_timeout: 600
    branch_start_delay: 2

  tasks:
    - id: delete_upu_master
      name: UPU Master Pod 删除
      case:
        name: upu_master_delete
        type: pod
        environment: 1_ssh_remote
        fault_type: delete
        pod_match:
          name:
            - upu-master
        duration: 240s
        loop_count: 5
        namespace: ns-dupf

    - id: delete_upu_slave
      name: UPU Slave Pod 删除
      case:
        name: upu_slave_delete
        type: pod
        environment: 1_ssh_remote
        fault_type: delete
        pod_match:
          name:
            - upu-slave
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
