# UPU 串行网络数据包重复工作流
# 依次对 upu-master, upu-slave Pod 注入数据包重复故障

workflow:
  id: upu_serial_network_duplicate_001
  name: UPU 串行网络数据包重复工作流
  description: 按顺序依次对 upu-master, upu-slave Pod 注入数据包重复故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: true
  
  timing:
    start_delay: 10
    node_interval: 10
    task_timeout: 300
    global_timeout: 1800

  tasks:
    - id: duplicate_upu_master
      name: UPU Master 数据包重复
      case:
        name: upu_master_duplicate
        type: network
        environment: 1_ssh_remote
        fault_type: duplicate
        pod_match:
          name:
            - upu-master
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
        parameters:
          percent: ["10%", "90%"]
          correlation: ["30%", "90%"]

    - id: duplicate_upu_slave
      name: UPU Slave 数据包重复
      case:
        name: upu_slave_duplicate
        type: network
        environment: 1_ssh_remote
        fault_type: duplicate
        pod_match:
          name:
            - upu-slave
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
        parameters:
          percent: ["10%", "90%"]
          correlation: ["30%", "90%"]
