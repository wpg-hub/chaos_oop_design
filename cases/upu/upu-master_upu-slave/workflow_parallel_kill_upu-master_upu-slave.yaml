# UPU 并行进程杀除工作流
# 同时对 upu-master, upu-slave Pod 注入进程杀除故障

workflow:
  id: upu_parallel_process_kill_001
  name: UPU 并行进程杀除工作流
  description: 并行对 upu-master, upu-slave Pod 注入进程杀除故障，测试系统容错能力
  execution_mode: parallel
  auto_clear: false
  
  timing:
    start_delay: 10
    task_timeout: 300
    global_timeout: 600
    branch_start_delay: 2

  tasks:
    - id: kill_upu_master
      name: UPU Master 进程杀除
      case:
        name: upu_master_kill
        type: process
        environment: 1_ssh_remote
        fault_type: kill
        pod_match:
          name:
            - upu-master
          random: true
          count: 1
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
        parameters:
          signal: 15
          main_process_pid: 1

    - id: kill_upu_slave
      name: UPU Slave 进程杀除
      case:
        name: upu_slave_kill
        type: process
        environment: 1_ssh_remote
        fault_type: kill
        pod_match:
          name:
            - upu-slave
          random: true
          count: 1
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
        parameters:
          signal: 15
          main_process_pid: 1
