# UPU 并行数据包重复工作流
# 对 upu Pod 注入数据包重复故障

workflow:
  id: upu_parallel_network_duplicate_001
  name: UPU 并行数据包重复工作流
  description: 并行对 upu Pod 注入数据包重复故障，测试系统容错能力
  execution_mode: parallel
  auto_clear: true
  
  timing:
    start_delay: 10
    task_timeout: 300
    global_timeout: 600
    branch_start_delay: 2

  tasks:
    - id: duplicate_upu
      name: UPU 数据包重复
      case:
        name: upu_duplicate
        type: network
        environment: 1_ssh_remote
        fault_type: duplicate
        pod_match:
          name:
            - upu
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
        parameters:
          percent: ["10%", "90%"]
          correlation: ["30%", "90%"]
