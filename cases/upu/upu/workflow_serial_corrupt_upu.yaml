# UPU 串行网络数据包破坏工作流
# 依次对 upu Pod 注入网络数据包破坏故障

workflow:
  id: upu_serial_network_corrupt_001
  name: UPU 串行网络数据包破坏工作流
  description: 按顺序依次对 upu Pod 注入网络数据包破坏故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: true
  
  timing:
    start_delay: 10
    node_interval: 10
    task_timeout: 300
    global_timeout: 1800

  tasks:
    - id: corrupt_upu
      name: UPU 网络数据包破坏
      case:
        name: upu_corrupt
        type: network
        environment: 1_ssh_remote
        fault_type: corrupt
        pod_match:
          name:
            - upu
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
        parameters:
          percent: ["10%", "90%"]
          correlation: ["30%", "90%"]
