# UPU 串行进程杀除工作流
# 依次对 upu Pod 注入进程杀除故障

workflow:
  id: upu_serial_process_kill_001
  name: UPU 串行进程杀除工作流
  description: 按顺序依次对 upu Pod 注入进程杀除故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: false
  
  timing:
    start_delay: 10
    node_interval: 10
    task_timeout: 300
    global_timeout: 1800

  tasks:
    - id: kill_upu
      name: UPU 进程杀除
      case:
        name: upu_kill
        type: process
        environment: 1_ssh_remote
        fault_type: kill
        pod_match:
          name:
            - upu
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
        parameters:
          signal: 15
          main_process_pid: 1
