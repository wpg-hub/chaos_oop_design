# UPU 串行 Pod 删除工作流
# 依次对 upu Pod 注入删除故障

workflow:
  id: upu_serial_pod_delete_001
  name: UPU 串行 Pod 删除工作流
  description: 按顺序依次对 upu Pod 注入删除故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: false
  
  timing:
    start_delay: 10
    node_interval: 10
    task_timeout: 300
    global_timeout: 1800

  tasks:
    - id: delete_upu
      name: UPU Pod 删除
      case:
        name: upu_delete
        type: pod
        environment: 1_ssh_remote
        fault_type: delete
        pod_match:
          name:
            - upu
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
