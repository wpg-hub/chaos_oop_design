# UPU 串行网络延迟工作流
# 依次对 upu Pod 注入网络延迟故障

workflow:
  id: upu_serial_network_delay_001
  name: UPU 串行网络延迟工作流
  description: 按顺序依次对 upu Pod 注入网络延迟故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: true
  
  timing:
    start_delay: 10
    node_interval: 10
    task_timeout: 300
    global_timeout: 1800

  tasks:
    - id: delay_upu
      name: UPU 网络延迟
      case:
        name: upu_delay
        type: network
        environment: 1_ssh_remote
        fault_type: delay
        pod_match:
          name:
            - upu
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
        parameters:
          time: ["100ms", "1000ms"]
          jitter: ["10ms", "100ms"]
          correlation: ["20%", "90%"]
          distribution: ["normal", "pareto", "paretonormal"]
