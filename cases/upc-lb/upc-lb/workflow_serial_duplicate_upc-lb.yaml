# UPC-LB 串行网络数据包重复工作流
# 对 upc-lb Pod 注入数据包重复故障

workflow:
  id: upc_lb_serial_network_duplicate_001
  name: UPC-LB 串行网络数据包重复工作流
  description: 对 upc-lb Pod 注入数据包重复故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: true
  
  timing:
    start_delay: 10
    node_interval: 10
    task_timeout: 300
    global_timeout: 1800

  tasks:
    - id: duplicate_upc_lb
      name: UPC-LB 数据包重复
      case:
        name: upc_lb_duplicate
        type: network
        environment: 1_ssh_remote
        fault_type: duplicate
        pod_match:
          name:
            - upc-lb
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
        parameters:
          percent: ["10%", "90%"]
          correlation: ["30%", "90%"]
