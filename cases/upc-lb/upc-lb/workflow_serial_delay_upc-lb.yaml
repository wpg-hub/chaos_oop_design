# UPC-LB 串行网络延迟工作流
# 对 upc-lb Pod 注入网络延迟故障

workflow:
  id: upc_lb_serial_network_delay_001
  name: UPC-LB 串行网络延迟工作流
  description: 对 upc-lb Pod 注入网络延迟故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: true
  
  timing:
    start_delay: 10
    node_interval: 10
    task_timeout: 300
    global_timeout: 1800

  tasks:
    - id: delay_upc_lb
      name: UPC-LB 网络延迟
      case:
        name: upc_lb_delay
        type: network
        environment: 1_ssh_remote
        fault_type: delay
        pod_match:
          name:
            - upc-nontalker
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
        parameters:
          time: ["100ms", "1000ms"]
          jitter: ["10ms", "100ms"]
          correlation: ["20%", "90%"]
          distribution: ["normal", "pareto", "paretonormal"]
