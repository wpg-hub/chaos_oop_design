# UPC-LB 串行 Pod 停止工作流
# 对 upc-lb Pod 注入停止故障

workflow:
  id: upc_lb_serial_pod_stop_001
  name: UPC-LB 串行 Pod 停止工作流
  description: 对 upc-lb Pod 注入停止故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: false
  
  timing:
    start_delay: 10
    node_interval: 10
    task_timeout: 300
    global_timeout: 1800

  tasks:
    - id: stop_upc_lb
      name: UPC-LB Pod 停止
      case:
        name: upc_lb_stop
        type: pod
        environment: 1_ssh_remote
        fault_type: stop
        pod_match:
          name:
            - upc-nontalker
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
