# UPC-LB 串行 Pod 删除工作流
# 对 upc-lb Pod 注入删除故障

workflow:
  id: upc_lb_serial_pod_delete_001
  name: UPC-LB 串行 Pod 删除工作流
  description: 对 upc-lb Pod 注入删除故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: false
  
  timing:
    start_delay: 10
    node_interval: 10
    task_timeout: 300
    global_timeout: 1800

  tasks:
    - id: delete_upc_lb
      name: UPC-LB Pod 删除
      case:
        name: upc_lb_delete
        type: pod
        environment: 1_ssh_remote
        fault_type: delete
        pod_match:
          name:
            - upc-lb
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
