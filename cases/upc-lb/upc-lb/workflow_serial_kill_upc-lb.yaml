# UPC-LB 串行进程杀除工作流
# 对 upc-lb Pod 注入进程杀除故障

workflow:
  id: upc_lb_serial_process_kill_001
  name: UPC-LB 串行进程杀除工作流
  description: 对 upc-lb Pod 注入进程杀除故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: false
  
  timing:
    start_delay: 10
    node_interval: 10
    task_timeout: 300
    global_timeout: 1800

  tasks:
    - id: kill_upc_lb
      name: UPC-LB 进程杀除
      case:
        name: upc_lb_kill
        type: process
        environment: 1_ssh_remote
        fault_type: kill
        pod_match:
          name:
            - upc-lb
          random: true
          count: 1
        duration: 240s
        loop_count: 5
        namespace: ns-dupf
        parameters:
          signal: 15
          main_process_pid: 1
