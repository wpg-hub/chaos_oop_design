# UPC 串行网络数据包重排序工作流
# 依次对 upc-nontalker, etcd-leader Pod 注入数据包重排序故障

workflow:
  id: upc_serial_network_reorder_001
  name: UPC 串行网络数据包重排序工作流
  description: 按顺序依次对 upc-nontalker, etcd-leader Pod 注入数据包重排序故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: true
  
  timing:
    start_delay: 120              # 整体启动延迟 5 秒
    node_interval: 10           # 节点间延迟 10 秒（等待前一个任务完成）
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 1800        # 全局超时 30 分钟

  tasks:
    - id: reorder_upc_nontalker
      name: UPC NonTalker 数据包重排序
      case:
        name: upc_nontalker_reorder
        type: network
        environment: 1_ssh_remote
        fault_type: reorder
        pod_match:
          name:
            - upc-nontalker
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          percent: ["0.5%", "10%"]
          correlation: ["10%", "90%"]
          gap: [1, 10]

    - id: reorder_etcd_leader
      name: ETCD Leader 数据包重排序
      case:
        name: etcd_leader_reorder
        type: network
        environment: 1_ssh_remote
        fault_type: reorder
        pod_match:
          name:
            - etcd-leader
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          percent: ["0.5%", "10%"]
          correlation: ["10%", "90%"]
          gap: [1, 10]
