# UPC 并行 Pod 停止工作流
# 同时对 upc-nontalker, mq-proxy Pod 注入停止故障

workflow:
  id: upc_parallel_pod_stop_001
  name: UPC 并行 Pod 停止工作流
  description: 并行对 upc-nontalker, mq-proxy Pod 注入停止故障，测试系统容错能力
  execution_mode: parallel
  auto_clear: false
  
  timing:
    start_delay: 5              # 整体启动延迟 5 秒
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 600         # 全局超时 10 分钟
    branch_start_delay: 2       # 分支启动延迟 2 秒（错开启动）

  tasks:
    - id: stop_upc_nontalker
      name: UPC NonTalker Pod 停止
      case:
        name: upc_nontalker_stop
        type: pod
        environment: 1_ssh_remote
        fault_type: stop
        pod_match:
          name:
            - upc-nontalker
        duration: 240s
        loop_count: 1
        namespace: ns-dupf

    - id: stop_mq_proxy
      name: MQ Proxy Pod 停止
      case:
        name: mq_proxy_stop
        type: pod
        environment: 1_ssh_remote
        fault_type: stop
        pod_match:
          name:
            - mq-proxy
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
