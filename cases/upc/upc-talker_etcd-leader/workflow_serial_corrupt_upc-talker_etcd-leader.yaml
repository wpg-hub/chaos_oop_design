# UPC 串行网络数据包破坏工作流
# 依次对 upc-talker, etcd-leader Pod 注入数据包破坏故障

workflow:
  id: upc_serial_network_corrupt_001
  name: UPC 串行网络数据包破坏工作流
  description: 按顺序依次对 upc-talker, etcd-leader Pod 注入数据包破坏故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: true
  
  timing:
    start_delay: 5              # 整体启动延迟 5 秒
    node_interval: 10           # 节点间延迟 10 秒（等待前一个任务完成）
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 1800        # 全局超时 30 分钟

  tasks:
    - id: corrupt_upc_talker
      name: UPC Talker 数据包破坏
      case:
        name: upc_talker_corrupt
        type: network
        environment: 1_ssh_remote
        fault_type: corrupt
        pod_match:
          name:
            - upc-talker
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          percent: ["10%", "90%"]
          correlation: ["30%", "90%"]

    - id: corrupt_etcd_leader
      name: Etcd Leader 数据包破坏
      case:
        name: etcd_leader_corrupt
        type: network
        environment: 1_ssh_remote
        fault_type: corrupt
        pod_match:
          name:
            - etcd-leader
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          percent: ["10%", "90%"]
          correlation: ["30%", "90%"]
