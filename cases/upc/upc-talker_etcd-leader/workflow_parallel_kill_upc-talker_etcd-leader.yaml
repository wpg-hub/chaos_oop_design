# UPC 并行进程杀除工作流
# 同时对 upc-talker, etcd-leader Pod 注入进程杀除故障

workflow:
  id: upc_parallel_process_kill_001
  name: UPC 并行进程杀除工作流
  description: 并行对 upc-talker, etcd-leader Pod 注入进程杀除故障，测试系统容错能力
  execution_mode: parallel
  auto_clear: false
  
  timing:
    start_delay: 120              # 整体启动延迟 5 秒
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 600         # 全局超时 10 分钟
    branch_start_delay: 2       # 分支启动延迟 2 秒（错开启动）

  tasks:
    - id: kill_upc_talker
      name: UPC Talker 进程杀除
      case:
        name: upc_talker_kill
        type: process
        environment: 1_ssh_remote
        fault_type: kill
        pod_match:
          name:
            - upc-talker
          random: true
          count: 1
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          signal: 15
          main_process_pid: 1

    - id: kill_etcd_leader
      name: Etcd Leader 进程杀除
      case:
        name: etcd_leader_kill
        type: process
        environment: 1_ssh_remote
        fault_type: kill
        pod_match:
          name:
            - etcd-leader
          random: true
          count: 1
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          signal: 15
          main_process_pid: 1
