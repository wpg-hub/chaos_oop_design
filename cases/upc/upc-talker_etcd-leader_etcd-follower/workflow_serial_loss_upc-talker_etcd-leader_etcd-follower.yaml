# UPC 串行网络丢包工作流
# 依次对 upc-talker, etcd-leader, etcd-follower Pod 注入网络丢包故障

workflow:
  id: upc_serial_network_loss_001
  name: UPC 串行网络丢包工作流
  description: 按顺序依次对 upc-talker, etcd-leader, etcd-follower Pod 注入网络丢包故障，测试系统恢复能力
  execution_mode: serial
  
  timing:
    start_delay: 5              # 整体启动延迟 5 秒
    node_interval: 10           # 节点间延迟 10 秒（等待前一个任务完成）
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 1800        # 全局超时 30 分钟

  tasks:
    - id: loss_upc_talker
      name: UPC Talker 网络丢包
      case:
        name: upc_talker_loss
        type: network
        environment: 1_ssh_remote
        fault_type: loss
        pod_match:
          name:
            - upc-talker
        duration: 60s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          ecn: random
          model:
            random:
              percent: ["10%", "80%"]
        auto_clear: true

    - id: loss_etcd_leader
      name: ETCD Leader 网络丢包
      case:
        name: etcd_leader_loss
        type: network
        environment: 1_ssh_remote
        fault_type: loss
        pod_match:
          name:
            - etcd-leader
        duration: 60s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          ecn: random
          model:
            random:
              percent: ["10%", "80%"]
        auto_clear: true

    - id: loss_etcd_follower
      name: ETCD Follower 网络丢包
      case:
        name: etcd_follower_loss
        type: network
        environment: 1_ssh_remote
        fault_type: loss
        pod_match:
          name:
            - etcd-follower
        duration: 60s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          ecn: random
          model:
            random:
              percent: ["10%", "80%"]
        auto_clear: true
