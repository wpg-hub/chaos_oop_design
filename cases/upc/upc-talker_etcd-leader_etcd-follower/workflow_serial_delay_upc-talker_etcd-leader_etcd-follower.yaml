# UPC 串行网络延迟工作流
# 依次对 upc-talker, etcd-leader, etcd-follower Pod 注入网络延迟故障

workflow:
  id: upc_serial_network_delay_001
  name: UPC 串行网络延迟工作流
  description: 按顺序依次对 upc-talker, etcd-leader, etcd-follower Pod 注入网络延迟故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: true
  
  timing:
    start_delay: 5              # 整体启动延迟 5 秒
    node_interval: 10           # 节点间延迟 10 秒（等待前一个任务完成）
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 1800        # 全局超时 30 分钟

  tasks:
    - id: delay_upc_talker
      name: UPC Talker 网络延迟
      case:
        name: upc_talker_delay
        type: network
        environment: 1_ssh_remote
        fault_type: delay
        pod_match:
          name:
            - upc-talker
        duration: 60s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          time: ["200ms", "800ms"]
          jitter: ["20ms", "100ms"]
          correlation: ["10%", "90%"]
          distribution: paretonormal

    - id: delay_etcd_leader
      name: ETCD Leader 网络延迟
      case:
        name: etcd_leader_delay
        type: network
        environment: 1_ssh_remote
        fault_type: delay
        pod_match:
          name:
            - etcd-leader
        duration: 60s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          time: ["200ms", "800ms"]
          jitter: ["20ms", "100ms"]
          correlation: ["10%", "90%"]
          distribution: paretonormal

    - id: delay_etcd_follower
      name: ETCD Follower 网络延迟
      case:
        name: etcd_follower_delay
        type: network
        environment: 1_ssh_remote
        fault_type: delay
        pod_match:
          name:
            - etcd-follower
        duration: 60s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          time: ["200ms", "800ms"]
          jitter: ["20ms", "100ms"]
          correlation: ["10%", "90%"]
          distribution: paretonormal
