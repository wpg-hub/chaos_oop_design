# UPC 并行 Pod 删除工作流
# 同时删除 upc-talker, etcd-leader, etcd-follower Pod

workflow:
  id: upc_parallel_pod_delete_001
  name: UPC 并行 Pod 删除工作流
  description: 并行删除 upc-talker, etcd-leader, etcd-follower Pod，测试系统容错能力
  execution_mode: parallel
  auto_clear: false
  
  timing:
    start_delay: 120              # 整体启动延迟 5 秒
    task_timeout: 300          # 单任务超时 5 分钟
    global_timeout: 600         # 全局超时 10 分钟
    branch_start_delay: 1       # 分支启动延迟 2 秒（错开启动）

  tasks:
    - id: delete_upc_talker
      name: 删除 UPC Talker Pod
      case:
        name: upc_talker_delete
        type: pod
        environment: 1_ssh_remote
        fault_type: delete
        pod_match:
          name:
            - upc-talker
        duration: 80s
        loop_count: 1
        #namespace: ns-dupf

    - id: delete_etcd_leader
      name: 删除 ETCD Leader Pod
      case:
        name: etcd_leader_delete
        type: pod
        environment: 1_ssh_remote
        fault_type: delete
        pod_match:
          name:
            - etcd-leader
        duration: 80s
        loop_count: 1
        #namespace: ns-dupf

    - id: delete_etcd_follower
      name: 删除 ETCD Follower Pod
      case:
        name: etcd_follower_delete
        type: pod
        environment: 1_ssh_remote
        fault_type: delete
        pod_match:
          name:
            - etcd-follower
        duration: 80s
        loop_count: 1
        #namespace: ns-dupf
