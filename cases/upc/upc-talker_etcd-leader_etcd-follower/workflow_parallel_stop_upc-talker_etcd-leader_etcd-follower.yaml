# UPC 并行 Pod Stop 工作流
# 同时停止 upc-talker, etcd-leader, etcd-follower Pod 容器

workflow:
  id: upc_parallel_pod_stop_001
  name: UPC 并行 Pod Stop 工作流
  description: 并行停止 upc-talker, etcd-leader, etcd-follower Pod 容器，测试系统容错能力
  execution_mode: parallel
  auto_clear: false
  
  timing:
    start_delay: 120              # 整体启动延迟 5 秒
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 600         # 全局超时 10 分钟
    branch_start_delay: 2       # 分支启动延迟 2 秒（错开启动）

  tasks:
    - id: stop_upc_talker
      name: 停止 UPC Talker Pod 容器
      case:
        name: upc_talker_stop
        type: pod
        environment: 1_ssh_remote
        fault_type: stop
        pod_match:
          name:
            - upc-talker
        duration: 80s
        loop_count: 1
        namespace: ns-dupf

    - id: stop_etcd_leader
      name: 停止 ETCD Leader Pod 容器
      case:
        name: etcd_leader_stop
        type: pod
        environment: 1_ssh_remote
        fault_type: stop
        pod_match:
          name:
            - etcd-leader
        duration: 80s
        loop_count: 1
        namespace: ns-dupf

    - id: stop_etcd_follower
      name: 停止 ETCD Follower Pod 容器
      case:
        name: etcd_follower_stop
        type: pod
        environment: 1_ssh_remote
        fault_type: stop
        pod_match:
          name:
            - etcd-follower
        duration: 80s
        loop_count: 1
        namespace: ns-dupf
