# UPC 并行网络数据包重复工作流
# 同时对 upc-talker, etcd-leader, etcd-follower Pod 注入数据包重复故障

workflow:
  id: upc_parallel_network_duplicate_001
  name: UPC 并行网络数据包重复工作流
  description: 并行对 upc-talker, etcd-leader, etcd-follower Pod 注入数据包重复故障，测试系统容错能力
  execution_mode: parallel
  
  timing:
    start_delay: 5              # 整体启动延迟 5 秒
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 600         # 全局超时 10 分钟
    branch_start_delay: 2       # 分支启动延迟 2 秒（错开启动）

  tasks:
    - id: duplicate_upc_talker
      name: UPC Talker 数据包重复
      case:
        name: upc_talker_duplicate
        type: network
        environment: 1_ssh_remote
        fault_type: duplicate
        pod_match:
          name:
            - upc-talker
        duration: 300s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          percent: ["0.5%", "10%"]
          correlation: ["10%", "90%"]
        auto_clear: true

    - id: duplicate_etcd_leader
      name: ETCD Leader 数据包重复
      case:
        name: etcd_leader_duplicate
        type: network
        environment: 1_ssh_remote
        fault_type: duplicate
        pod_match:
          name:
            - etcd-leader
        duration: 300s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          percent: ["0.5%", "10%"]
          correlation: ["10%", "90%"]
        auto_clear: true

    - id: duplicate_etcd_follower
      name: ETCD Follower 数据包重复
      case:
        name: etcd_follower_duplicate
        type: network
        environment: 1_ssh_remote
        fault_type: duplicate
        pod_match:
          name:
            - etcd-follower
        duration: 300s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          percent: ["0.5%", "10%"]
          correlation: ["10%", "90%"]
        auto_clear: true
