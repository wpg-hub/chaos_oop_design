# UPC 并行网络数据包重复工作流
# 同时对 upc-nontalker, ddb-master Pod 注入数据包重复故障

workflow:
  id: upc_parallel_network_duplicate_001
  name: UPC 并行网络数据包重复工作流
  description: 并行对 upc-nontalker, ddb-master Pod 注入数据包重复故障，测试系统容错能力
  execution_mode: parallel
  auto_clear: true
  
  timing:
    start_delay: 5              # 整体启动延迟 5 秒
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 600         # 全局超时 10 分钟
    branch_start_delay: 2       # 分支启动延迟 2 秒（错开启动）

  tasks:
    - id: duplicate_upc_nontalker
      name: UPC NonTalker 数据包重复
      case:
        name: upc_nontalker_duplicate
        type: network
        environment: 1_ssh_remote
        fault_type: duplicate
        pod_match:
          name:
            - upc-nontalker
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          percent: ["10%", "90%"]
          correlation: ["30%", "90%"]

    - id: duplicate_ddb_master
      name: DDB Master 数据包重复
      case:
        name: ddb_master_duplicate
        type: network
        environment: 1_ssh_remote
        fault_type: duplicate
        pod_match:
          name:
            - ddb-master
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          percent: ["10%", "90%"]
          correlation: ["30%", "90%"]
