# UPC 串行网络延迟工作流
# 依次对 upc-nontalker, ddb-master Pod 注入网络延迟故障

workflow:
  id: upc_serial_network_delay_001
  name: UPC 串行网络延迟工作流
  description: 按顺序依次对 upc-nontalker, ddb-master Pod 注入网络延迟故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: true
  
  timing:
    start_delay: 5              # 整体启动延迟 5 秒
    node_interval: 10           # 节点间延迟 10 秒（等待前一个任务完成）
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 1800        # 全局超时 30 分钟

  tasks:
    - id: delay_upc_nontalker
      name: UPC NonTalker 网络延迟
      case:
        name: upc_nontalker_delay
        type: network
        environment: 1_ssh_remote
        fault_type: delay
        pod_match:
          name:
            - upc-nontalker
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          time: ["100ms", "1000ms"]
          jitter: ["10ms", "100ms"]
          correlation: ["20%", "90%"]
          distribution: ["normal", "pareto", "paretonormal"]

    - id: delay_ddb_master
      name: DDB Master 网络延迟
      case:
        name: ddb_master_delay
        type: network
        environment: 1_ssh_remote
        fault_type: delay
        pod_match:
          name:
            - ddb-master
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          time: ["100ms", "1000ms"]
          jitter: ["10ms", "100ms"]
          correlation: ["20%", "90%"]
          distribution: ["normal", "pareto", "paretonormal"]
