# UPC 并行进程杀除工作流
# 同时对 upc-nontalker, ddb-master, ddb-slave Pod 注入进程杀除故障

workflow:
  id: upc_parallel_process_kill_001
  name: UPC 并行进程杀除工作流
  description: 并行对 upc-nontalker, ddb-master, ddb-slave Pod 注入进程杀除故障，测试系统容错能力
  execution_mode: parallel
  auto_clear: false
  
  timing:
    start_delay: 5              # 整体启动延迟 5 秒
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 600         # 全局超时 10 分钟
    branch_start_delay: 2       # 分支启动延迟 2 秒（错开启动）

  tasks:
    - id: kill_upc_nontalker
      name: UPC NonTalker 进程杀除
      case:
        name: upc_nontalker_kill
        type: process
        environment: 1_ssh_remote
        fault_type: kill
        pod_match:
          name:
            - upc-nontalker
          random: true
          count: 1
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          signal: 15
          main_process_pid: 1

    - id: kill_ddb_master
      name: DDB Master 进程杀除
      case:
        name: ddb_master_kill
        type: process
        environment: 1_ssh_remote
        fault_type: kill
        pod_match:
          name:
            - ddb-master
          random: true
          count: 1
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          signal: 15
          main_process_pid: 1

    - id: kill_ddb_slave
      name: DDB Slave 进程杀除
      case:
        name: ddb_slave_kill
        type: process
        environment: 1_ssh_remote
        fault_type: kill
        pod_match:
          name:
            - ddb-slave
          random: true
          count: 1
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          signal: 15
          main_process_pid: 1
