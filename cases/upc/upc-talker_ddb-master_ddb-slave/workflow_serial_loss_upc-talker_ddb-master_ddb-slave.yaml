# UPC 串行网络丢包工作流
# 依次对 upc-talker, ddb-master, ddb-slave Pod 注入网络丢包故障

workflow:
  id: upc_serial_network_loss_001
  name: UPC 串行网络丢包工作流
  description: 按顺序依次对 upc-talker, ddb-master, ddb-slave Pod 注入网络丢包故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: true
  
  timing:
    start_delay: 5              # 整体启动延迟 5 秒
    node_interval: 10           # 节点间延迟 10 秒（等待前一个任务完成）
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 1800        # 全局超时 30 分钟

  tasks:
    - id: loss_upc_talker
      name: UPC Talker 网络丢包
      case:
        name: upc_talker_loss
        type: network
        environment: 1_ssh_remote
        fault_type: loss
        pod_match:
          name:
            - upc-talker
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          percent: ["10%", "90%"]
          correlation: ["30%", "90%"]

    - id: loss_ddb_master
      name: DDB Master 网络丢包
      case:
        name: ddb_master_loss
        type: network
        environment: 1_ssh_remote
        fault_type: loss
        pod_match:
          name:
            - ddb-master
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          percent: ["10%", "90%"]
          correlation: ["30%", "90%"]

    - id: loss_ddb_slave
      name: DDB Slave 网络丢包
      case:
        name: ddb_slave_loss
        type: network
        environment: 1_ssh_remote
        fault_type: loss
        pod_match:
          name:
            - ddb-slave
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          percent: ["10%", "90%"]
          correlation: ["30%", "90%"]
