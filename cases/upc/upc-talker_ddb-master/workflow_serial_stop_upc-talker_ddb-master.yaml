# UPC 串行 Pod 停止工作流
# 依次对 upc-talker, ddb-master Pod 注入停止故障

workflow:
  id: upc_serial_pod_stop_001
  name: UPC 串行 Pod 停止工作流
  description: 按顺序依次对 upc-talker, ddb-master Pod 注入停止故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: false
  
  timing:
    start_delay: 120              # 整体启动延迟 5 秒
    node_interval: 10           # 节点间延迟 10 秒（等待前一个任务完成）
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 1800        # 全局超时 30 分钟

  tasks:
    - id: stop_upc_talker
      name: UPC Talker Pod 停止
      case:
        name: upc_talker_stop
        type: pod
        environment: 1_ssh_remote
        fault_type: stop
        pod_match:
          name:
            - upc-talker
        duration: 240s
        loop_count: 1
        namespace: ns-dupf

    - id: stop_ddb_master
      name: DDB Master Pod 停止
      case:
        name: ddb_master_stop
        type: pod
        environment: 1_ssh_remote
        fault_type: stop
        pod_match:
          name:
            - ddb-master
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
