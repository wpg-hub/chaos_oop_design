# UPC 串行 Pod 删除工作流
# 依次对 upc-nontalker, rc-leader Pod 注入删除故障

workflow:
  id: upc_serial_pod_delete_001
  name: UPC 串行 Pod 删除工作流
  description: 按顺序依次对 upc-nontalker, rc-leader Pod 注入删除故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: false
  
  timing:
    start_delay: 5              # 整体启动延迟 5 秒
    node_interval: 10           # 节点间延迟 10 秒（等待前一个任务完成）
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 1800        # 全局超时 30 分钟

  tasks:
    - id: delete_upc_nontalker
      name: UPC NonTalker Pod 删除
      case:
        name: upc_nontalker_delete
        type: pod
        environment: 1_ssh_remote
        fault_type: delete
        pod_match:
          name:
            - upc-nontalker
        duration: 240s
        loop_count: 1
        namespace: ns-dupf

    - id: delete_rc_leader
      name: RC Leader Pod 删除
      case:
        name: rc_leader_delete
        type: pod
        environment: 1_ssh_remote
        fault_type: delete
        pod_match:
          name:
            - rc-leader
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
