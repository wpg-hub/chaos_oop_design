# UPC 串行进程杀除工作流
# 依次对 upc-talker, sdb-all Pod 注入进程杀除故障

workflow:
  id: upc_serial_process_kill_001
  name: UPC 串行进程杀除工作流
  description: 按顺序依次对 upc-talker, sdb-all Pod 注入进程杀除故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: false
  
  timing:
    start_delay: 5              # 整体启动延迟 5 秒
    node_interval: 10           # 节点间延迟 10 秒（等待前一个任务完成）
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 1800        # 全局超时 30 分钟

  tasks:
    - id: kill_upc_talker
      name: UPC Talker 进程杀除
      case:
        name: upc_talker_kill
        type: process
        environment: 1_ssh_remote
        fault_type: kill
        pod_match:
          name:
            - upc-talker
          random: true
          count: 1
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          signal: 15
          main_process_pid: 1

    - id: kill_sdb_all
      name: SDB All 进程杀除
      case:
        name: sdb_all_kill
        type: process
        environment: 1_ssh_remote
        fault_type: kill
        pod_match:
          name:
            - sdb-all
          random: true
          count: 1
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          signal: 15
          main_process_pid: 1
