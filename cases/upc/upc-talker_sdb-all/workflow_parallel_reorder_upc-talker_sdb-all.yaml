# UPC 并行网络数据包重排序工作流
# 同时对 upc-talker, sdb-all Pod 注入数据包重排序故障

workflow:
  id: upc_parallel_network_reorder_001
  name: UPC 并行网络数据包重排序工作流
  description: 并行对 upc-talker, sdb-all Pod 注入数据包重排序故障，测试系统容错能力
  execution_mode: parallel
  auto_clear: true
  
  timing:
    start_delay: 5              # 整体启动延迟 5 秒
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 600         # 全局超时 10 分钟
    branch_start_delay: 2       # 分支启动延迟 2 秒（错开启动）

  tasks:
    - id: reorder_upc_talker
      name: UPC Talker 数据包重排序
      case:
        name: upc_talker_reorder
        type: network
        environment: 1_ssh_remote
        fault_type: reorder
        pod_match:
          name:
            - upc-talker
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          percent: ["0.5%", "10%"]
          correlation: ["10%", "90%"]
          gap: [1, 10]

    - id: reorder_sdb_all
      name: SDB All 数据包重排序
      case:
        name: sdb_all_reorder
        type: network
        environment: 1_ssh_remote
        fault_type: reorder
        pod_match:
          name:
            - sdb-all
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          percent: ["0.5%", "10%"]
          correlation: ["10%", "90%"]
          gap: [1, 10]
