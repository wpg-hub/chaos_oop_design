# UPC 并行网络丢包工作流
# 同时对 upc-talker, sdb-all Pod 注入网络丢包故障

workflow:
  id: upc_parallel_network_loss_001
  name: UPC 并行网络丢包工作流
  description: 并行对 upc-talker, sdb-all Pod 注入网络丢包故障，测试系统容错能力
  execution_mode: parallel
  auto_clear: true
  
  timing:
    start_delay: 10              # 整体启动延迟 5 秒
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 600         # 全局超时 10 分钟
    branch_start_delay: 2       # 分支启动延迟 2 秒（错开启动）

  tasks:
    - id: loss_upc_talker
      name: UPC Talker 网络丢包
      case:
        name: upc_talker_loss
        type: network
        environment: 1_ssh_remote
        fault_type: loss
        pod_match:
          name:
            - upc-talker
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          percent: ["10%", "90%"]
          correlation: ["30%", "90%"]

    - id: loss_sdb_all
      name: SDB All 网络丢包
      case:
        name: sdb_all_loss
        type: network
        environment: 1_ssh_remote
        fault_type: loss
        pod_match:
          name:
            - sdb-all
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          percent: ["10%", "90%"]
          correlation: ["30%", "90%"]
