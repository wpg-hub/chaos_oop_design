# UPC 并行网络延迟工作流
# 同时对 upc-talker, mq-proxy Pod 注入网络延迟故障

workflow:
  id: upc_parallel_network_delay_001
  name: UPC 并行网络延迟工作流
  description: 并行对 upc-talker, mq-proxy Pod 注入网络延迟故障，测试系统容错能力
  execution_mode: parallel
  auto_clear: true
  
  timing:
    start_delay: 120              # 整体启动延迟 5 秒
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 600         # 全局超时 10 分钟
    branch_start_delay: 2       # 分支启动延迟 2 秒（错开启动）

  tasks:
    - id: delay_upc_talker
      name: UPC Talker 网络延迟
      case:
        name: upc_talker_delay
        type: network
        environment: 1_ssh_remote
        fault_type: delay
        pod_match:
          name:
            - upc-talker
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          time: ["100ms", "1000ms"]
          jitter: ["10ms", "100ms"]
          correlation: ["20%", "90%"]
          distribution: ["normal", "pareto", "paretonormal"]

    - id: delay_mq_proxy
      name: MQ Proxy 网络延迟
      case:
        name: mq_proxy_delay
        type: network
        environment: 1_ssh_remote
        fault_type: delay
        pod_match:
          name:
            - mq-proxy
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          time: ["100ms", "1000ms"]
          jitter: ["10ms", "100ms"]
          correlation: ["20%", "90%"]
          distribution: ["normal", "pareto", "paretonormal"]
