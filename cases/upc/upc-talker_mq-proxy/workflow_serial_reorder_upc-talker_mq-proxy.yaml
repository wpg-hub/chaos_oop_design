# UPC 串行网络数据包重排序工作流
# 依次对 upc-talker, mq-proxy Pod 注入数据包重排序故障

workflow:
  id: upc_serial_network_reorder_001
  name: UPC 串行网络数据包重排序工作流
  description: 按顺序依次对 upc-talker, mq-proxy Pod 注入数据包重排序故障，测试系统恢复能力
  execution_mode: serial
  auto_clear: true
  
  timing:
    start_delay: 5              # 整体启动延迟 5 秒
    node_interval: 10           # 节点间延迟 10 秒（等待前一个任务完成）
    task_timeout: 300           # 单任务超时 5 分钟
    global_timeout: 1800        # 全局超时 30 分钟

  tasks:
    - id: reorder_upc_talker
      name: UPC Talker 数据包重排序
      case:
        name: upc_talker_reorder
        type: network
        environment: 1_ssh_remote
        fault_type: reorder
        pod_match:
          name:
            - upc-talker
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          percent: ["0.5%", "10%"]
          correlation: ["10%", "90%"]
          gap: [1, 10]

    - id: reorder_mq_proxy
      name: MQ Proxy 数据包重排序
      case:
        name: mq_proxy_reorder
        type: network
        environment: 1_ssh_remote
        fault_type: reorder
        pod_match:
          name:
            - mq-proxy
        duration: 240s
        loop_count: 1
        namespace: ns-dupf
        parameters:
          percent: ["0.5%", "10%"]
          correlation: ["10%", "90%"]
          gap: [1, 10]
