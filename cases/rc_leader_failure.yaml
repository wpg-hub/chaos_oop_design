# RC Leader 故障测试 Case 示例
name: rc_leader_failure
description: RC leader pod failure fault test
type: pod
environment: 1_ssh_remote
fault_type: delete
pod_match:
  name:
    - rc-leader
  namespace: ns-dupf
  interval: 5
duration: 30s
loop_count: 0
parameters:
  action: kill
  grace_period: 30
namespace: ns-dupf
auto_clear: false
